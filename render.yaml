services:
  - type: web
    name: inventory-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEET_NAME
        value: Equipamentos
      - key: GOOGLE_PROJECT_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
